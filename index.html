<!DOCTYPE html>
<html>

<head>

<title>Assam Weather Data Portal</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin-bottom:20px;
    font-size:18px;
}

.card{
    background:#1e293b;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

button{
    background:#38bdf8;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

iframe{
    width:100%;
    height:500px;
    border:none;
    background:white;
    margin-top:20px;
    border-radius:10px;
}

</style>

</head>

<body>

<h1>🌦 Assam Weather Data Portal</h1>

<input
type="text"
id="searchBox"
placeholder="Search Station ID..."
>

<div id="results">

Loading data...

</div>

<iframe id="viewer"></iframe>

<script>

let allFiles = [];

async function loadData(){

    try{

        const response = await fetch(
            "https://riobijoy.github.io/weather-dashboard/files.json?v=" + Date.now()
        );

        const data = await response.json();

        allFiles = data;

        showResults(data);

    }

    catch(error){

        console.log(error);

        document.getElementById("results").innerHTML =
        "Unable to load data";

    }

}

function showResults(data){

    let html = "";

    data.forEach(item => {

        html += `

        <div class="card">

            <h3>${item.station_id}</h3>

            <p><b>Folder:</b> ${item.folder}</p>

            <p><b>File:</b> ${item.file}</p>

            <button onclick="viewFile('${item.preview_file}')">

                View CSV

            </button>

        </div>

        `;

    });

    document.getElementById("results").innerHTML = html;

}

function viewFile(file){

    document.getElementById("viewer").src =
    "https://riobijoy.github.io/weather-dashboard/" + file;

}

document.getElementById("searchBox")

.addEventListener("keyup", function(){

    const value = this.value.toLowerCase();

    const filtered = allFiles.filter(item =>

        item.station_id.toLowerCase().includes(value)

    );

    showResults(filtered);

});

loadData();

</script>

</body>

</html>
