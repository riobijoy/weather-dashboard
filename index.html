<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assam Weather Data Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:
    linear-gradient(135deg,#0f172a,#111827,#020617);
    color:white;
    min-height:100vh;
    padding:25px;
}

.header{
    margin-bottom:30px;
}

.title{
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    color:#94a3b8;
    font-size:18px;
}

.search-container{
    position:sticky;
    top:0;
    z-index:999;
    background:rgba(15,23,42,0.9);
    backdrop-filter:blur(12px);
    padding-bottom:20px;
    margin-bottom:30px;
}

.search-box{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:18px;
    outline:none;
    backdrop-filter:blur(10px);
}

.search-box::placeholder{
    color:#94a3b8;
}

.folder{
    margin-bottom:30px;
}

.folder-title{
    font-size:24px;
    margin-bottom:18px;
    padding:16px 20px;
    border-radius:18px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(10px);
    color:#38bdf8;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:22px;
    backdrop-filter:blur(14px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.station{
    font-size:24px;
    font-weight:bold;
    margin-bottom:18px;
    color:#ffffff;
}

.info{
    margin-bottom:10px;
    color:#cbd5e1;
    word-break:break-word;
}

.label{
    color:#38bdf8;
    font-weight:bold;
}

.btn{
    width:100%;
    margin-top:18px;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:#00111f;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    opacity:0.9;
    transform:scale(1.02);
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:20px;
}

.modal-content{
    width:100%;
    max-width:1200px;
    height:85vh;
    background:#0f172a;
    border-radius:24px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    border:1px solid rgba(255,255,255,0.1);
}

.modal-header{
    padding:18px 22px;
    background:#111827;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.modal-title{
    font-size:20px;
    font-weight:bold;
    color:#38bdf8;
}

.close-btn{
    background:red;
    color:white;
    border:none;
    width:38px;
    height:38px;
    border-radius:50%;
    cursor:pointer;
    font-size:18px;
}

.csv-view{
    flex:1;
    overflow:auto;
    padding:20px;
    background:#020617;
}

pre{
    white-space:pre-wrap;
    word-break:break-word;
    color:#e2e8f0;
    line-height:1.5;
    font-size:14px;
}

.no-data{
    text-align:center;
    margin-top:60px;
    color:#94a3b8;
    font-size:22px;
}

@media(max-width:768px){

    .title{
        font-size:30px;
    }

    .folder-title{
        font-size:20px;
    }

}

</style>

</head>

<body>

<div class="header">

    <div class="title">
        🌦 Assam Weather Data Portal
    </div>

    <div class="subtitle">
        Live FTP Weather Archive Viewer
    </div>

</div>

<div class="search-container">

    <input
    type="text"
    id="search"
    class="search-box"
    placeholder="Search by Station ID..."
    >

</div>

<div id="content">

Loading Data...

</div>

<div class="modal" id="modal">

    <div class="modal-content">

        <div class="modal-header">

            <div class="modal-title" id="modalTitle">
                CSV Preview
            </div>

            <button class="close-btn" onclick="closeModal()">
                ×
            </button>

        </div>

        <div class="csv-view">

            <pre id="csvContent"></pre>

        </div>

    </div>

</div>

<script>

let allFiles = [];

async function loadData(){

    try{

        const response = await fetch(
            "./files.json?v=" + Date.now()
        );

        const data = await response.json();

        allFiles = data;

        render(data);

    }

    catch(error){

        console.log(error);

        document.getElementById("content").innerHTML =
        "<div class='no-data'>Unable to load data</div>";

    }

}

function render(data){

    const grouped = {};

    data.forEach(item => {

        if(!grouped[item.folder]){

            grouped[item.folder] = [];

        }

        grouped[item.folder].push(item);

    });

    let html = "";

    Object.keys(grouped).forEach(folder => {

        html += `

        <div class="folder">

            <div class="folder-title">

                📁 ${folder}

            </div>

            <div class="grid">

        `;

        grouped[folder].forEach(item => {

            html += `

            <div class="card">

                <div class="station">

                    ${item.station_id}

                </div>

                <div class="info">

                    <span class="label">File:</span>
                    ${item.file}

                </div>

                <button
                class="btn"
                onclick="viewCSV('${item.preview_file}','${item.file}')">

                    View CSV

                </button>

            </div>

            `;

        });

        html += `

            </div>

        </div>

        `;

    });

    if(data.length === 0){

        html =
        "<div class='no-data'>No matching station found</div>";

    }

    document.getElementById("content").innerHTML = html;

}

async function viewCSV(file,name){

    try{

        document.getElementById("modal").style.display = "flex";

        document.getElementById("modalTitle").innerText = name;

        const response = await fetch(file);

        const text = await response.text();

        document.getElementById("csvContent").innerText = text;

    }

    catch(error){

        document.getElementById("csvContent").innerText =
        "Unable to load CSV";

    }

}

function closeModal(){

    document.getElementById("modal").style.display = "none";

}

document.getElementById("search")

.addEventListener("keyup",function(){

    const value = this.value.toLowerCase();

    const filtered = allFiles.filter(item =>

        item.station_id.toLowerCase().includes(value)

    );

    render(filtered);

});

loadData();

</script>

</body>

</html>
