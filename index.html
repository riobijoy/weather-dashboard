<!DOCTYPE html>
<html>

<head>

<title>Assam Weather Data Portal</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin-bottom:20px;
    font-size:18px;
}

.card{
    background:#1e293b;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

button{
    background:#38bdf8;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

iframe{
    width:100%;
    height:500px;
    border:none;
    background:white;
    margin-top:20px;
}

</style>

</head>

<body>

<h1>🌦 Assam Weather Data Portal</h1>

<input type="text"
id="searchBox"
placeholder="Search Station ID...">

<div id="results"></div>

<iframe id="viewer"></iframe>

<script>

let allFiles = [];

fetch("./files.json?v=" + Date.now())

.then(response => response.json())

.then(data => {

    allFiles = data;

    showResults(data);

});

function showResults(data){

    let html = "";

    data.forEach(item => {

        html += `

        <div class="card">

            <h3>${item.station_id}</h3>

            <p><b>Folder:</b> ${item.folder}</p>

            <p><b>File:</b> ${item.file}</p>

            <button onclick="viewFile('${item.preview_file}')">

                View CSV

            </button>

        </div>

        `;

    });

    document.getElementById("results").innerHTML = html;
}

function viewFile(file){

    document.getElementById("viewer").src = file;

}

document.getElementById("searchBox")

.addEventListener("keyup", function(){

    let value = this.value.toLowerCase();

    let filtered = allFiles.filter(item =>

        item.station_id.toLowerCase().includes(value)

    );

    showResults(filtered);

});

</script>

</body>

</html>
