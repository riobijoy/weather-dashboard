<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assam Weather Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#020617;
font-family:Arial;
color:white;
padding:20px;
}

.title{
font-size:40px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
color:#94a3b8;
margin-bottom:30px;
}

.section-title{
font-size:28px;
margin:30px 0 20px;
color:#38bdf8;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.08);
}

.station{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.info{
margin-bottom:10px;
color:#cbd5e1;
word-break:break-word;
}

.label{
color:#38bdf8;
font-weight:bold;
}

.filters{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:25px;
}

input{
padding:15px;
border:none;
border-radius:14px;
background:#0f172a;
color:white;
font-size:16px;
outline:none;
}

.btn{
padding:13px;
border:none;
border-radius:14px;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
margin-top:10px;
width:100%;
}

.clear-btn{
background:red;
color:white;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:9999;
}

.modal-box{
width:100%;
max-width:1200px;
height:85vh;
background:#0f172a;
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
}

.modal-header{
background:#111827;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.close-btn{
width:40px;
height:40px;
border:none;
border-radius:50%;
background:red;
color:white;
font-size:18px;
cursor:pointer;
}

.csv-content{
flex:1;
overflow:auto;
padding:20px;
}

pre{
white-space:pre-wrap;
word-break:break-word;
line-height:1.5;
}

.no-data{
text-align:center;
margin-top:40px;
font-size:22px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="title">
🌦 Assam Weather Dashboard
</div>

<div class="subtitle">
Live FTP Weather Monitoring System
</div>

<div class="section-title">
Latest Station Data
</div>

<div class="grid" id="latestData">
Loading latest data...
</div>

<div class="section-title">
Historical Search
</div>

<div class="filters">

<input
type="text"
id="stationSearch"
placeholder="Search Station ID..."
>

<input
type="text"
id="dateSearch"
placeholder="Search Date (dd-mm-yyyy)"
>

<button
class="btn clear-btn"
onclick="clearFilters()">

Clear Filters

</button>

</div>

<div class="grid" id="historyData">
Loading history...
</div>

<div class="modal" id="modal">

<div class="modal-box">

<div class="modal-header">

<h2 id="modalTitle">
CSV Preview
</h2>

<button
class="close-btn"
onclick="closeModal()">
×
</button>

</div>

<div class="csv-content">

<pre id="csvText"></pre>

</div>

</div>

</div>

<script>

let allFiles = [];

async function loadLatest(){

const response =
await fetch("./latest.json?v=" + Date.now());

const data =
await response.json();

let html = "";

data.forEach(item => {

html += `

<div class="card">

<div class="station">
${item.station_id}
</div>

<div class="info">
<span class="label">Folder:</span>
${item.folder}
</div>

<div class="info">
<span class="label">Date:</span>
${item.date}
</div>

<div class="info">
<span class="label">File:</span>
${item.file}
</div>

<button
class="btn"
onclick="viewCSV('${item.preview_file}','${item.file}')">

View Latest CSV

</button>

</div>

`;

});

document.getElementById("latestData")
.innerHTML = html;

}

async function loadHistory(){

const response =
await fetch("./files.json?v=" + Date.now());

const data =
await response.json();

allFiles = data;

renderHistory(data.slice(0,20));

}

function renderHistory(data){

let html = "";

data.forEach(item => {

html += `

<div class="card">

<div class="station">
${item.station_id}
</div>

<div class="info">
<span class="label">Folder:</span>
${item.folder}
</div>

<div class="info">
<span class="label">Date:</span>
${item.date}
</div>

<div class="info">
<span class="label">File:</span>
${item.file}
</div>

<button
class="btn"
onclick="viewCSV('${item.preview_file}','${item.file}')">

View CSV

</button>

</div>

`;

});

if(data.length === 0){

html =
"<div class='no-data'>No records found</div>";

}

document.getElementById("historyData")
.innerHTML = html;

}

async function viewCSV(file,name){

document.getElementById("modal")
.style.display = "flex";

document.getElementById("modalTitle")
.innerText = name;

try{

const response =
await fetch(file);

const text =
await response.text();

document.getElementById("csvText")
.innerText = text;

}

catch{

document.getElementById("csvText")
.innerText =
"Unable to load CSV";

}

}

function closeModal(){

document.getElementById("modal")
.style.display = "none";

}

function applyFilters(){

const station =
document.getElementById("stationSearch")
.value
.toLowerCase()
trim();

const date =
document.getElementById("dateSearch")
.value
.toLowerCase()
trim();

const filtered =
allFiles.filter(item => {

const stationMatch =
item.station_id
.toLowerCase()
.includes(station);

const dateMatch =
item.date
.toLowerCase()
.includes(date);

return stationMatch && dateMatch;

});

renderHistory(filtered);

}

function clearFilters(){

document.getElementById("stationSearch")
.value = "";

document.getElementById("dateSearch")
.value = "";

renderHistory(allFiles.slice(0,20));

}

document
.getElementById("stationSearch")
.addEventListener("keyup",applyFilters);

document
.getElementById("dateSearch")
.addEventListener("keyup",applyFilters);

loadLatest();

loadHistory();

</script>

</body>

</html>
