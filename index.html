<!DOCTYPE html>
<html>

<head>

<title>Assam Weather Dashboard</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.title{
    font-size:22px;
    margin-bottom:10px;
    color:#38bdf8;
}

.item{
    margin:8px 0;
    font-size:16px;
}

.label{
    color:#94a3b8;
}

</style>

</head>

<body>

<h1>🌦 Assam Weather Monitoring Dashboard</h1>

<div class="grid" id="weatherGrid">

Loading Weather Data...

</div>

<script>

fetch("https://riobijoy.github.io/weather-dashboard/latest.json?v=" + Date.now())

.then(response => response.json())

.then(data => {

    let html = "";

    data.forEach(item => {

        html += `

        <div class="card">

            <div class="title">${item.folder}</div>

            <div class="item">
                <span class="label">Station ID:</span>
                ${item.station_id}
            </div>

            <div class="item">
                <span class="label">Date Time:</span>
                ${item.datetime}
            </div>

            <div class="item">
                <span class="label">Battery:</span>
                ${item.battery}
            </div>

            <div class="item">
                <span class="label">Water Level:</span>
                ${item.water_level}
            </div>

            <div class="item">
                <span class="label">Hourly Rain:</span>
                ${item.hourly_rain}
            </div>

            <div class="item">
                <span class="label">Daily Rain:</span>
                ${item.daily_rain}
            </div>

            <div class="item">
                <span class="label">Temperature:</span>
                ${item.temperature} °C
            </div>

        </div>

        `;
    });

    document.getElementById("weatherGrid").innerHTML = html;

})

.catch(error => {

    console.log(error);

    document.getElementById("weatherGrid").innerHTML =
    "Unable to load weather data";

});

</script>

</body>

</html>
