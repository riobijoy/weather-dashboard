<!DOCTYPE html>
<html>

<head>

<title>Assam Weather Data Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

.header{
    margin-bottom:25px;
}

.title{
    font-size:34px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    color:#94a3b8;
    font-size:16px;
}

.search-box{
    position:sticky;
    top:0;
    z-index:100;
    background:#0f172a;
    padding-bottom:20px;
}

input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    font-size:18px;
    outline:none;
}

.folder-section{
    margin-top:35px;
}

.folder-title{
    font-size:24px;
    margin-bottom:18px;
    color:#38bdf8;
    border-left:5px solid #38bdf8;
    padding-left:12px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:18px;
}

.card{
    background:#1e293b;
    border-radius:18px;
    padding:18px;
    transition:0.3s;
    border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.station{
    font-size:22px;
    font-weight:bold;
    margin-bottom:12px;
    color:#ffffff;
}

.item{
    margin-bottom:8px;
    color:#cbd5e1;
    word-break:break-word;
}

.label{
    color:#38bdf8;
    font-weight:bold;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:#000;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.85;
}

.viewer-box{
    margin-top:40px;
}

.viewer-title{
    font-size:22px;
    margin-bottom:15px;
    color:#38bdf8;
}

iframe{
    width:100%;
    height:600px;
    border:none;
    border-radius:18px;
    background:white;
}

.no-data{
    margin-top:30px;
    text-align:center;
    color:#94a3b8;
    font-size:20px;
}

@media(max-width:600px){

    .title{
        font-size:26px;
    }

    .folder-title{
        font-size:20px;
    }

}

</style>

</head>

<body>

<div class="header">

    <div class="title">
        🌦 Assam Weather Data Portal
    </div>

    <div class="subtitle">
        Live FTP Weather Archive Viewer
    </div>

</div>

<div class="search-box">

    <input
    type="text"
    id="searchBox"
    placeholder="Search Station ID..."
    >

</div>

<div id="results">

Loading data...

</div>

<div class="viewer-box">

    <div class="viewer-title">
        CSV Preview
    </div>

    <iframe id="viewer"></iframe>

</div>

<script>

let allFiles = [];

async function loadData(){

    try{

        const response = await fetch(
            "https://riobijoy.github.io/weather-dashboard/files.json?v=" + Date.now()
        );

        const data = await response.json();

        allFiles = data;

        renderData(data);

    }

    catch(error){

        console.log(error);

        document.getElementById("results").innerHTML =
        "<div class='no-data'>Unable to load weather data</div>";

    }

}

function renderData(data){

    const grouped = {};

    data.forEach(item => {

        if(!grouped[item.folder]){

            grouped[item.folder] = [];

        }

        grouped[item.folder].push(item);

    });

    let html = "";

    Object.keys(grouped).forEach(folder => {

        html += `

        <div class="folder-section">

            <div class="folder-title">

                📁 ${folder}

            </div>

            <div class="grid">

        `;

        grouped[folder].forEach(item => {

            html += `

            <div class="card">

                <div class="station">

                    ${item.station_id}

                </div>

                <div class="item">

                    <span class="label">File:</span>
                    ${item.file}

                </div>

                <div class="item">

                    <span class="label">Folder:</span>
                    ${item.folder}

                </div>

                <button onclick="viewFile('${item.preview_file}')">

                    View CSV

                </button>

            </div>

            `;

        });

        html += `

            </div>

        </div>

        `;

    });

    if(data.length === 0){

        html = "<div class='no-data'>No station found</div>";

    }

    document.getElementById("results").innerHTML = html;

}

function viewFile(file){

    document.getElementById("viewer").src =
    "https://riobijoy.github.io/weather-dashboard/" + file;

    window.scrollTo({
        top:document.body.scrollHeight,
        behavior:'smooth'
    });

}

document.getElementById("searchBox")

.addEventListener("keyup", function(){

    const value = this.value.toLowerCase();

    const filtered = allFiles.filter(item =>

        item.station_id.toLowerCase().includes(value)

    );

    renderData(filtered);

});

loadData();

</script>

</body>

</html>
