<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Assam Weather Intelligence Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    linear-gradient(135deg,#020617,#0f172a,#111827);
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

.header{
    margin-bottom:30px;
}

.title{
    font-size:40px;
    font-weight:bold;
}

.subtitle{
    color:#94a3b8;
    margin-top:8px;
}

.stats{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin:30px 0;
}

.stat-card{
    background:rgba(255,255,255,0.06);
    border-radius:22px;
    padding:20px;
    backdrop-filter:blur(12px);
}

.stat-title{
    color:#94a3b8;
    margin-bottom:10px;
}

.stat-value{
    font-size:32px;
    font-weight:bold;
    color:#38bdf8;
}

.filters{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:16px;
    outline:none;
}

.folder{
    margin-bottom:40px;
}

.folder-title{
    font-size:24px;
    color:#38bdf8;
    margin-bottom:18px;
    padding:14px 18px;
    background:rgba(255,255,255,0.05);
    border-radius:16px;
}

.grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.06);
    border-radius:24px;
    padding:20px;
    backdrop-filter:blur(10px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.station{
    font-size:24px;
    font-weight:bold;
    margin-bottom:14px;
}

.info{
    margin-bottom:10px;
    color:#cbd5e1;
}

.label{
    color:#38bdf8;
    font-weight:bold;
}

.btn{
    width:100%;
    margin-top:16px;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:20px;
}

.modal-box{
    width:100%;
    max-width:1200px;
    height:85vh;
    background:#0f172a;
    border-radius:24px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.modal-header{
    background:#111827;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.close-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:red;
    color:white;
    cursor:pointer;
}

.csv-content{
    flex:1;
    overflow:auto;
    padding:20px;
}

pre{
    white-space:pre-wrap;
    word-break:break-word;
    line-height:1.5;
}

.no-data{
    text-align:center;
    margin-top:50px;
    color:#94a3b8;
    font-size:22px;
}

</style>

</head>

<body>

<div class="header">

    <div class="title">

        🌦 Assam Weather Intelligence Portal

    </div>

    <div class="subtitle">

        FTP Weather Archive Monitoring System

    </div>

</div>

<div class="stats">

    <div class="stat-card">

        <div class="stat-title">

            Total Files

        </div>

        <div class="stat-value" id="totalFiles">

            0

        </div>

    </div>

    <div class="stat-card">

        <div class="stat-title">

            Total Stations

        </div>

        <div class="stat-value" id="totalStations">

            0

        </div>

    </div>

</div>

<div class="filters">

    <input
    type="text"
    id="stationSearch"
    placeholder="Search Station ID..."
    >

    <input
    type="date"
    id="fromDate"
    >

    <input
    type="date"
    id="toDate"
    >

</div>

<div id="content">

Loading Data...

</div>

<div class="modal" id="modal">

    <div class="modal-box">

        <div class="modal-header">

            <h2 id="modalTitle">

                CSV Preview

            </h2>

            <button
            class="close-btn"
            onclick="closeModal()">

                ×

            </button>

        </div>

        <div class="csv-content">

            <pre id="csvText"></pre>

        </div>

    </div>

</div>

<script>

let allFiles = [];

async function loadData(){

    try{

        const response = await fetch(
            "./files.json?v=" + Date.now()
        );

        const data = await response.json();

        allFiles = data;

        updateStats(data);

        render(data);

    }

    catch(error){

        document.getElementById("content").innerHTML =
        "<div class='no-data'>Unable to load data</div>";

    }

}

function updateStats(data){

    document.getElementById("totalFiles")
    .innerText = data.length;

    const stations =
    [...new Set(data.map(x => x.station_id))];

    document.getElementById("totalStations")
    .innerText = stations.length;

}

function extractDate(file){

    try{

        const parts = file.split("_");

        const raw = parts[1];

        const yy = raw.substring(0,2);
        const mm = raw.substring(2,4);
        const dd = raw.substring(4,6);

        return `20${yy}-${mm}-${dd}`;

    }

    catch{

        return "";

    }

}

function render(data){

    const grouped = {};

    data.forEach(item => {

        if(!grouped[item.folder]){

            grouped[item.folder] = [];

        }

        grouped[item.folder].push(item);

    });

    let html = "";

    Object.keys(grouped).forEach(folder => {

        html += `

        <div class="folder">

            <div class="folder-title">

                📁 ${folder}

            </div>

            <div class="grid">

        `;

        grouped[folder].forEach(item => {

            const fileDate =
            extractDate(item.file);

            html += `

            <div class="card">

                <div class="station">

                    ${item.station_id}

                </div>

                <div class="info">

                    <span class="label">File:</span>
                    ${item.file}

                </div>

                <div class="info">

                    <span class="label">Date:</span>
                    ${fileDate}

                </div>

                <button
                class="btn"
                onclick="viewCSV('${item.preview_file}','${item.file}')">

                    View CSV

                </button>

            </div>

            `;

        });

        html += `

            </div>

        </div>

        `;

    });

    if(data.length === 0){

        html =
        "<div class='no-data'>No matching records found</div>";

    }

    document.getElementById("content").innerHTML =
    html;

}

async function viewCSV(file,name){

    try{

        document.getElementById("modal")
        .style.display = "flex";

        document.getElementById("modalTitle")
        .innerText = name;

        const response =
        await fetch(file);

        const text =
        await response.text();

        document.getElementById("csvText")
        .innerText = text;

    }

    catch{

        document.getElementById("csvText")
        .innerText = "Unable to load CSV";

    }

}

function closeModal(){

    document.getElementById("modal")
    .style.display = "none";

}

function applyFilters(){

    const station =
    document.getElementById("stationSearch")
    .value
    .toLowerCase();

    const fromDate =
    document.getElementById("fromDate")
    .value;

    const toDate =
    document.getElementById("toDate")
    .value;

    const filtered =
    allFiles.filter(item => {

        const matchStation =
        item.station_id
        .toLowerCase()
        .includes(station);

        const fileDate =
        extractDate(item.file);

        let matchDate = true;

        if(fromDate){

            matchDate =
            matchDate &&
            fileDate >= fromDate;

        }

        if(toDate){

            matchDate =
            matchDate &&
            fileDate <= toDate;

        }

        return matchStation && matchDate;

    });

    render(filtered);

}

document
.getElementById("stationSearch")
.addEventListener("keyup",applyFilters);

document
.getElementById("fromDate")
.addEventListener("change",applyFilters);

document
.getElementById("toDate")
.addEventListener("change",applyFilters);

loadData();

</script>

</body>

</html>
